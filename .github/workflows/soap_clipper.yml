name: Soap Shorts Clipper

on:
  push:
    paths:
      - "output/soap_pending.jsonl"
  workflow_dispatch:

jobs:
  clip:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yt-dlp
        run: |
          sudo curl -sSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp

      - name: Install system dependencies
        run: sudo apt-get install -y --fix-missing ffmpeg


      - name: Install Python dependencies
        run: pip install requests python-dotenv google-api-python-client google-auth-oauthlib

      - name: Run soap clipper
        env:
          DISCORD_BOT_TOKEN:     ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:    ${{ secrets.DISCORD_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m agents.soap_clipper

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/soap_pending.jsonl output/soap_processed.jsonl \
                  output/soap_discord_pending.jsonl output/clips/ || true
          git diff --staged --quiet || git commit -m "[soap-clipper] processed clips"
          git push
